<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>홀짝 주사위</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --felt-dark:#08211a;
    --felt:#0f3a2c;
    --felt-light:#175a42;
    --gold:#7fe0b8;
    --gold-bright:#c9ffe2;
    --cream:#e6f5ee;
    --odd-red:#c0456f;
    --even-blue:#3aa0c9;
    --shadow:rgba(0,0,0,0.55);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse at top, #0f2d24 0%, #081712 60%, #030a08 100%);
    font-family:'Noto Sans KR', sans-serif;
    color:var(--cream);
    display:flex;
    justify-content:center;
    padding:24px 14px 40px;
  }
  .app{
    width:100%;
    max-width:420px;
  }
  .header{
    text-align:center;
    margin-bottom:20px;
  }
  .header h1{
    font-family:'Noto Serif KR', serif;
    font-weight:900;
    font-size:28px;
    margin:0;
    background:linear-gradient(180deg, var(--gold-bright), var(--gold));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    letter-spacing:0.08em;
  }
  .table{
    position:relative;
    border-radius:22px;
    padding:2px;
    background:linear-gradient(160deg, var(--gold-bright), #1f6b4f 45%, var(--gold));
    box-shadow:0 18px 40px var(--shadow);
    margin-bottom:22px;
  }
  .table-inner{
    border-radius:20px;
    background:
      radial-gradient(ellipse at center, var(--felt-light) 0%, var(--felt) 55%, var(--felt-dark) 100%);
    padding:16px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
  }
  .table-inner::before{
    content:"";
    position:absolute;
    inset:10px;
    border:1px solid rgba(212,175,55,0.25);
    border-radius:14px;
    pointer-events:none;
    z-index:2;
  }
  .arena{
    position:relative;
    width:100%;
    height:360px;
    margin-bottom:14px;
  }
  .die-unit{
    position:absolute;
    top:0;
    left:0;
    width:60px;
    height:88px;
    display:flex;
    flex-direction:column;
    align-items:center;
    will-change:transform;
  }
  .die-shadow{
    position:absolute;
    top:58px;
    width:38px;
    height:9px;
    border-radius:50%;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0.55), rgba(0,0,0,0) 72%);
    animation:shadowPulse 5.5s ease-in-out infinite;
  }
  .dice-stage{
    perspective:760px;
    height:74px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    z-index:1;
  }
  .die{
    width:50px;
    height:50px;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 1.05s cubic-bezier(.16,.9,.2,1.08);
  }
  .die.rolling{
    transition:none;
  }
  .die.idle-float{
    animation:floatIdle 5.5s ease-in-out infinite;
  }
  @keyframes floatIdle{
    0%{transform:translateY(0px) rotateX(0deg) rotateY(0deg) rotateZ(0deg);}
    25%{transform:translateY(-10px) rotateX(90deg) rotateY(75deg) rotateZ(7deg);}
    50%{transform:translateY(-2px) rotateX(180deg) rotateY(165deg) rotateZ(-5deg);}
    75%{transform:translateY(-11px) rotateX(270deg) rotateY(260deg) rotateZ(6deg);}
    100%{transform:translateY(0px) rotateX(360deg) rotateY(360deg) rotateZ(0deg);}
  }
  @keyframes shadowPulse{
    0%,100%{transform:scale(1);opacity:0.5;}
    25%{transform:scale(0.72);opacity:0.3;}
    50%{transform:scale(0.85);opacity:0.38;}
    75%{transform:scale(0.68);opacity:0.28;}
  }
  .face{
    position:absolute;
    width:50px;
    height:50px;
    border-radius:9px;
    box-shadow:inset 0 0 6px rgba(0,0,0,0.1);
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr);
    padding:7px;
  }
  .pip{border-radius:50%;background:#2a1010;width:7px;height:7px;justify-self:center;align-self:center;}
  .f1{transform:translateZ(25px); background:linear-gradient(145deg,#ffffff,#eeeae0);}
  .f6{transform:rotateX(180deg) translateZ(25px); background:linear-gradient(145deg,#d8d3c6,#c3bdaf);}
  .f2{transform:rotateY(90deg) translateZ(25px); background:linear-gradient(145deg,#f2eee2,#ddd7c8);}
  .f5{transform:rotateY(-90deg) translateZ(25px); background:linear-gradient(145deg,#efeadc,#d6d0c1);}
  .f3{transform:rotateX(90deg) translateZ(25px); background:linear-gradient(145deg,#f7f3e8,#e3ddce);}
  .f4{transform:rotateX(-90deg) translateZ(25px); background:linear-gradient(145deg,#e6e1d3,#cfc9ba);}
  .status-text{
    font-size:14px;
    color:#e8d9b0;
    min-height:20px;
    text-align:center;
  }
  .status-text.win{color:#8ef0a0;font-weight:700;font-size:16px;}
  .status-text.lose{color:#f09090;font-weight:700;font-size:16px;}
  .summary{
    display:flex;
    gap:10px;
    margin-top:4px;
  }
  .summary .pill{
    font-size:12px;
    padding:4px 12px;
    border-radius:20px;
    border:1px solid rgba(212,175,55,0.4);
    color:#c9b98a;
  }
  .controls{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    margin-bottom:16px;
  }
  .count-label{
    font-size:12px;
    letter-spacing:0.1em;
    color:#c9b98a;
    text-transform:uppercase;
    margin-bottom:6px;
    text-align:center;
  }
  .count-row{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .count-row button{
    width:38px;height:38px;
    border-radius:50%;
    border:1px solid rgba(212,175,55,0.5);
    background:rgba(212,175,55,0.08);
    color:var(--gold-bright);
    font-size:20px;
    cursor:pointer;
  }
  .count-row button:disabled{opacity:0.3;cursor:not-allowed;}
  .count-row .count-val{
    font-family:'Cinzel',serif;
    font-size:20px;
    min-width:28px;
    text-align:center;
  }
  .choice-row{
    display:flex;
    gap:10px;
    margin-bottom:20px;
  }
  .choice-btn{
    flex:1;
    padding:16px 0;
    border:none;
    border-radius:14px;
    font-family:'Noto Serif KR', serif;
    font-weight:700;
    font-size:18px;
    cursor:pointer;
    color:#fff;
    transition:transform 0.12s ease;
  }
  .choice-btn:active{transform:scale(0.97);}
  .choice-btn:disabled{opacity:0.5;cursor:not-allowed;}
  .choice-odd{background:linear-gradient(180deg,#c24545,var(--odd-red));box-shadow:0 8px 18px rgba(168,50,50,0.35);}
  .choice-even{background:linear-gradient(180deg,#3f7ab0,var(--even-blue));box-shadow:0 8px 18px rgba(47,95,143,0.35);}
  .choice-btn small{display:block;font-family:'Noto Sans KR',sans-serif;font-weight:400;font-size:11px;opacity:0.85;margin-top:2px;}
  .streak-section{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    margin-bottom:20px;
    padding:14px 12px;
    border:1px solid rgba(212,175,55,0.3);
    border-radius:14px;
    background:rgba(212,175,55,0.05);
  }
  .streak-top{
    display:flex;
    justify-content:space-between;
    width:100%;
    font-size:12px;
    color:#c9b98a;
  }
  .streak-top .streak-current{
    font-family:'Cinzel',serif;
    font-size:16px;
    color:var(--gold-bright);
    margin-left:6px;
  }
  .streak-top .streak-best-val{
    font-family:'Cinzel',serif;
    font-size:14px;
    color:var(--cream);
    margin-left:6px;
  }
  .streak-pips{
    display:flex;
    gap:6px;
  }
  .pip-dot{
    width:16px;
    height:16px;
    border-radius:50%;
    border:1px solid rgba(212,175,55,0.4);
    background:rgba(0,0,0,0.25);
    transition:background 0.25s ease, transform 0.25s ease;
  }
  .pip-dot.filled{
    background:linear-gradient(180deg, var(--gold-bright), var(--gold));
    border-color:transparent;
    transform:scale(1.08);
  }
  .history-section{
    margin-top:22px;
  }
  .history-title{
    font-size:12px;
    letter-spacing:0.12em;
    color:#c9b98a;
    text-transform:uppercase;
    margin-bottom:8px;
    text-align:center;
  }
  .history-table{
    width:100%;
    border-collapse:separate;
    border-spacing:5px;
    table-layout:fixed;
  }
  .history-table td{
    background:rgba(212,175,55,0.07);
    border:1px solid rgba(212,175,55,0.25);
    border-radius:9px;
    text-align:center;
    padding:8px 2px;
    font-size:12px;
    font-weight:700;
    color:#8a7a5e;
  }
  .history-table td.rec-odd{
    color:#fff;
    background:linear-gradient(180deg,#c24545,var(--odd-red));
    border-color:transparent;
  }
  .history-table td.rec-even{
    color:#fff;
    background:linear-gradient(180deg,#3f7ab0,var(--even-blue));
    border-color:transparent;
  }
  .history-table td .rec-label{
    display:block;
    font-size:11px;
  }
  .history-table td .rec-num{
    display:block;
    font-size:11px;
    font-weight:400;
    opacity:0.85;
    margin-top:1px;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>✨ 홀짝 주사위 ✨</h1>
  </div>

  <div class="table">
    <div class="table-inner">
      <div class="arena" id="arena"></div>
      <div class="status-text" id="status">홀/짝을 선택하세요</div>
      <div class="summary" id="summary"></div>
    </div>
  </div>

  <div class="streak-section">
    <div class="streak-top">
      <span>연승<span class="streak-current" id="streakVal">0</span></span>
      <span>최고<span class="streak-best-val" id="bestVal">0</span></span>
    </div>
    <div class="streak-pips" id="streakPips"></div>
  </div>

  <div class="choice-row">
    <button class="choice-btn choice-odd" id="chooseOdd">홀 (Odd)<small>1, 3, 5</small></button>
    <button class="choice-btn choice-even" id="chooseEven">짝 (Even)<small>2, 4, 6</small></button>
  </div>

  <div class="history-section">
    <div class="history-title">최근 10회 홀짝 기록</div>
    <table class="history-table">
      <tbody id="historyBody"></tbody>
    </table>
  </div>
</div>

<script>
(function(){
  const UNIT_W = 60;
  const UNIT_H = 88;
  const DIE_RADIUS = 28; // collision radius around each die's center
  const DIE_CENTER_Y = 37; // vertical center of the die within its unit box
  const HISTORY_MAX = 10;
  const STREAK_PIPS = 10;
  const diceCount = 2; // fixed at two dice
  let rolling = false;
  let dice = []; // {el, dieEl, x, y, vx, vy, frozen}
  let rafId = null;
  let history = []; // { value, isOdd }, newest first
  let currentStreak = 0;
  let bestStreak = 0;

  const arena = document.getElementById('arena');
  const statusEl = document.getElementById('status');
  const summaryEl = document.getElementById('summary');
  const historyBody = document.getElementById('historyBody');
  const streakVal = document.getElementById('streakVal');
  const bestVal = document.getElementById('bestVal');
  const streakPips = document.getElementById('streakPips');
  const chooseOdd = document.getElementById('chooseOdd');
  const chooseEven = document.getElementById('chooseEven');

  const rotations = {
    1: 'rotateX(0deg) rotateY(0deg)',
    6: 'rotateX(-180deg) rotateY(0deg)',
    2: 'rotateY(-90deg)',
    5: 'rotateY(90deg)',
    3: 'rotateX(-90deg)',
    4: 'rotateX(90deg)'
  };

  function faceHtml(){
    return `
      <div class="face f1"><div></div><div></div><div></div><div></div><div class="pip" style="grid-column:2;grid-row:2;"></div><div></div><div></div><div></div><div></div></div>
      <div class="face f6">
        <div class="pip"></div><div></div><div class="pip"></div>
        <div class="pip"></div><div></div><div class="pip"></div>
        <div class="pip"></div><div></div><div class="pip"></div>
      </div>
      <div class="face f2">
        <div class="pip"></div><div></div><div></div>
        <div></div><div></div><div></div>
        <div></div><div></div><div class="pip"></div>
      </div>
      <div class="face f5">
        <div class="pip"></div><div></div><div class="pip"></div>
        <div></div><div class="pip"></div><div></div>
        <div class="pip"></div><div></div><div class="pip"></div>
      </div>
      <div class="face f3">
        <div></div><div></div><div class="pip"></div>
        <div></div><div class="pip"></div><div></div>
        <div class="pip"></div><div></div><div></div>
      </div>
      <div class="face f4">
        <div class="pip"></div><div></div><div class="pip"></div>
        <div></div><div></div><div></div>
        <div class="pip"></div><div></div><div class="pip"></div>
      </div>
    `;
  }

  function randVel(){
    // slow gentle drift, random direction
    const speed = 0.35 + Math.random() * 0.35;
    const angle = Math.random() * Math.PI * 2;
    return { vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed };
  }

  function centerOf(d){
    return { cx: d.x + UNIT_W / 2, cy: d.y + DIE_CENTER_Y };
  }

  function findFreeSpot(maxX, maxY, placed){
    for(let attempt = 0; attempt < 40; attempt++){
      const x = Math.random() * maxX;
      const y = Math.random() * maxY;
      const cx = x + UNIT_W / 2;
      const cy = y + DIE_CENTER_Y;
      let ok = true;
      for(const p of placed){
        const dx = cx - p.cx, dy = cy - p.cy;
        if(Math.sqrt(dx * dx + dy * dy) < DIE_RADIUS * 2.05){ ok = false; break; }
      }
      if(ok) return { x, y };
    }
    // fallback: just place randomly if we couldn't find a clean spot
    return { x: Math.random() * maxX, y: Math.random() * maxY };
  }

  function buildDice(){
    // cancel previous animation loop while we rebuild
    if(rafId) cancelAnimationFrame(rafId);
    arena.innerHTML = '';
    dice = [];

    const w = arena.clientWidth || 320;
    const h = arena.clientHeight || 360;
    const maxX = Math.max(0, w - UNIT_W);
    const maxY = Math.max(0, h - UNIT_H);
    const placedCenters = [];

    for(let i = 0; i < diceCount; i++){
      const unit = document.createElement('div');
      unit.className = 'die-unit';
      unit.innerHTML = `
        <div class="dice-stage">
          <div class="die-shadow"></div>
          <div class="die idle-float">${faceHtml()}</div>
        </div>
      `;
      arena.appendChild(unit);

      const spot = findFreeSpot(maxX, maxY, placedCenters);
      placedCenters.push({ cx: spot.x + UNIT_W / 2, cy: spot.y + DIE_CENTER_Y });

      const v = randVel();
      const d = {
        el: unit,
        dieEl: unit.querySelector('.die'),
        x: spot.x,
        y: spot.y,
        vx: v.vx,
        vy: v.vy,
        frozen: false,
        tumbleRaf: null,
        rx: 0, ry: 0, rz: 0
      };
      unit.style.transform = `translate(${d.x}px, ${d.y}px)`;
      dice.push(d);
    }

    startLoop();
  }

  function resolveCollisions(maxX, maxY){
    for(let i = 0; i < dice.length; i++){
      for(let j = i + 1; j < dice.length; j++){
        const a = dice[i], b = dice[j];
        if(a.frozen || b.frozen) continue;

        const ca = centerOf(a), cb = centerOf(b);
        let dx = cb.cx - ca.cx;
        let dy = cb.cy - ca.cy;
        let dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = DIE_RADIUS * 2;

        if(dist === 0){
          dx = 0.5; dy = 0.5; dist = Math.sqrt(0.5);
        }

        if(dist < minDist){
          const nx = dx / dist, ny = dy / dist;
          const overlap = minDist - dist;

          a.x -= nx * overlap / 2; a.y -= ny * overlap / 2;
          b.x += nx * overlap / 2; b.y += ny * overlap / 2;

          a.x = Math.min(Math.max(a.x, 0), maxX);
          a.y = Math.min(Math.max(a.y, 0), maxY);
          b.x = Math.min(Math.max(b.x, 0), maxX);
          b.y = Math.min(Math.max(b.y, 0), maxY);

          // elastic velocity exchange along the collision normal (equal mass)
          const v1n = a.vx * nx + a.vy * ny;
          const v2n = b.vx * nx + b.vy * ny;
          a.vx += (v2n - v1n) * nx; a.vy += (v2n - v1n) * ny;
          b.vx += (v1n - v2n) * nx; b.vy += (v1n - v2n) * ny;
        }
      }
    }
  }

  function startLoop(){
    function step(){
      const w = arena.clientWidth || 320;
      const h = arena.clientHeight || 360;
      const maxX = Math.max(0, w - UNIT_W);
      const maxY = Math.max(0, h - UNIT_H);

      dice.forEach(d => {
        if(d.frozen) return;
        d.x += d.vx;
        d.y += d.vy;

        if(d.x <= 0){ d.x = 0; d.vx = Math.abs(d.vx); }
        else if(d.x >= maxX){ d.x = maxX; d.vx = -Math.abs(d.vx); }

        if(d.y <= 0){ d.y = 0; d.vy = Math.abs(d.vy); }
        else if(d.y >= maxY){ d.y = maxY; d.vy = -Math.abs(d.vy); }
      });

      resolveCollisions(maxX, maxY);

      dice.forEach(d => {
        if(d.frozen) return;
        d.el.style.transform = `translate(${d.x}px, ${d.y}px)`;
      });

      rafId = requestAnimationFrame(step);
    }
    rafId = requestAnimationFrame(step);
  }

  function render(){
    chooseOdd.disabled = rolling;
    chooseEven.disabled = rolling;
  }

  function renderStreak(){
    streakVal.textContent = currentStreak;
    bestVal.textContent = bestStreak;
    const filled = Math.min(currentStreak, STREAK_PIPS);
    let dots = '';
    for(let i = 0; i < STREAK_PIPS; i++){
      dots += `<div class="pip-dot${i < filled ? ' filled' : ''}"></div>`;
    }
    streakPips.innerHTML = dots;
  }

  function startTumble(d){
    d.dieEl.classList.remove('idle-float');
    d.dieEl.classList.add('rolling'); // disables CSS transition while we drive it manually
    d.rx = 0; d.ry = 0; d.rz = 0;
    const spinX = 16 + Math.random() * 10;
    const spinY = 13 + Math.random() * 12;
    const spinZ = 4 + Math.random() * 5;
    const dirZ = Math.random() < 0.5 ? -1 : 1;

    function frame(t){
      d.rx += spinX;
      d.ry += spinY;
      d.rz += spinZ * dirZ;
      const depth = Math.sin(d.rx * Math.PI / 180) * 14; // pushes toward/away from viewer for real depth
      d.dieEl.style.transform =
        `translateZ(${depth}px) rotateX(${d.rx}deg) rotateY(${d.ry}deg) rotateZ(${d.rz}deg)`;
      d.tumbleRaf = requestAnimationFrame(frame);
    }
    d.tumbleRaf = requestAnimationFrame(frame);
  }

  function stopTumble(d, result){
    if(d.tumbleRaf) cancelAnimationFrame(d.tumbleRaf);
    d.tumbleRaf = null;
    d.dieEl.classList.remove('rolling'); // re-enable smooth CSS transition
    // small delay so the browser registers the transition before we set the final transform
    requestAnimationFrame(() => {
      d.dieEl.style.transform = rotations[result];
    });
  }

  function roll(choice){
    if(rolling) return;
    rolling = true;
    render();
    statusEl.className = 'status-text';
    statusEl.textContent = '주사위를 굴리는 중...';
    summaryEl.innerHTML = '';

    const results = dice.map(() => Math.floor(Math.random() * 6) + 1);

    dice.forEach(d => {
      d.frozen = true;
      startTumble(d);
    });

    setTimeout(() => {
      dice.forEach((d, i) => stopTumble(d, results[i]));

      setTimeout(() => {
        const sum = results.reduce((s, v) => s + v, 0);
        const isOdd = sum % 2 === 1;
        const won = (choice === 'odd' && isOdd) || (choice === 'even' && !isOdd);

        const eq = results.length > 1
          ? `${results.join(' + ')} = ${sum}`
          : `${sum}`;
        summaryEl.innerHTML = `<div class="pill">${eq} (${isOdd ? '홀' : '짝'})</div>`;

        if(won){
          currentStreak += 1;
          if(currentStreak > bestStreak) bestStreak = currentStreak;
          statusEl.textContent = `승리! 🎉 ${currentStreak}연승`;
          statusEl.className = 'status-text win';
        } else {
          currentStreak = 0;
          statusEl.textContent = '패배... 연승이 끊겼습니다';
          statusEl.className = 'status-text lose';
        }

        pushHistory(sum);
        renderStreak();

        setTimeout(() => {
          dice.forEach(d => {
            d.dieEl.style.transform = '';
            d.dieEl.classList.add('idle-float');
            d.frozen = false;
          });
          rolling = false;
          render();
        }, 1600);
      }, 550);
    }, 900);
  }

  chooseOdd.onclick = () => roll('odd');
  chooseEven.onclick = () => roll('even');

  function pushHistory(sum){
    history.unshift({ value: sum, isOdd: sum % 2 === 1 });
    if(history.length > HISTORY_MAX) history.length = HISTORY_MAX;
    renderHistory();
  }

  function renderHistory(){
    const cells = [];
    for(let i = 0; i < HISTORY_MAX; i++){
      const entry = history[i];
      if(entry){
        const label = entry.isOdd ? '홀' : '짝';
        const cls = entry.isOdd ? 'rec-odd' : 'rec-even';
        cells.push(`<td class="${cls}"><span class="rec-label">${label}</span><span class="rec-num">(${entry.value})</span></td>`);
      } else {
        cells.push(`<td>-</td>`);
      }
    }
    const row1 = cells.slice(0, 5).join('');
    const row2 = cells.slice(5, 10).join('');
    historyBody.innerHTML = `<tr>${row1}</tr><tr>${row2}</tr>`;
  }

  window.addEventListener('resize', () => {
    buildDice();
  });

  buildDice();
  renderHistory();
  renderStreak();
  render();
})();
</script>
</body>

</html>
